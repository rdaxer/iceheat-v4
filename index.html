<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IceHeat v4</title>

    <link rel="stylesheet" href="styles.css">

    <!-- PWA -->
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#0ea5e9" />

    <!-- OpenCV -->
    <script async src="https://docs.opencv.org/4.x/opencv.js"></script>

    <!-- Tesseract OCR -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>

<body>
    <div id="app">

        <header class="topbar">
            <div class="logo">ICE<span>HEAT</span></div>

            <nav class="tabs">
                <button data-page="drivers">Fahrer</button>
                <button data-page="heats">Heats</button>
                <button data-page="results">Ergebnisse</button>
                <button data-page="scan">Scan</button>
            </nav>
        </header>

        <main id="pages">

            <section id="page-drivers" class="page active">
                <h2>Fahrer</h2>
                <button id="addDriver">+ Fahrer hinzufügen</button>
                <div id="driverList"></div>
            </section>

            <section id="page-heats" class="page">
                <h2>Heats</h2>
                <button id="addHeat">+ Heat hinzufügen</button>
                <div id="heatList"></div>
            </section>

            <section id="page-results" class="page">
                <h2>Ergebnisse</h2>
                <div id="resultsTable"></div>
            </section>

            <section id="page-scan" class="page">
                <h2>Heatschema scannen</h2>

                <div class="scan-box">
                    <input type="file" id="scanInput" accept="image/*" capture="environment" />
                    <canvas id="scanCanvas" width="800" height="600"></canvas>
                </div>

                <button id="startScan" class="primary-btn">Scan starten</button>
                <div id="scanStatus"></div>
                <pre id="scanOutput"></pre>
            </section>

        </main>
    </div>

    <!-- SCRIPTS -->
    <script src="src/app.js" type="module"></script>
    <script src="src/router.js" type="module"></script>
    <script src="src/state.js" type="module"></script>
    <script src="src/storage.js" type="module"></script>

    <script src="src/ui/drivers.js" type="module"></script>
    <script src="src/ui/heats.js" type="module"></script>
    <script src="src/ui/results.js" type="module"></script>
    <script src="src/ui/scanner.js" type="module"></script>

    <script src="src/vision/scan-engine.js" type="module"></script>
    <script src="src/vision/color-detection.js" type="module"></script>
    <script src="src/vision/cell-segmentation.js" type="module"></script>
    <script src="src/vision/heat-reconstruction.js" type="module"></script>
    <script src="src/vision/ocr.js" type="module"></script>
</body>
</html>
